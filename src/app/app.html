@if (!router.url.startsWith('/admin')) {
<ng-container #digitalDnaHost></ng-container>
<app-navigation></app-navigation>
}

<main class="main-content">
  <router-outlet></router-outlet>
</main>

@if (!router.url.startsWith('/admin')) {

  @defer (on idle) {
    <app-footer />
  }

  @if (!aiAssistantLoaded) {
    <button
      type="button"
      class="ai-toggle ai-toggle-lazy"
      aria-label="Открыть AI Assistant"
      (click)="loadAiAssistant(true)"
    >
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
      </svg>
    </button>
  }

  <ng-container #aiAssistantHost></ng-container>

}
