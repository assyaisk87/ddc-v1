<nav class="navigation" [class.scrolled]="isScrolled">
  <div class="container nav-container">
    <!-- Logo -->
    <a routerLink="/" class="logo" (click)="closeMobileMenu()">
      <div class="logo-icon">
        <img src="/icons/ddc_logo.svg"  width="48" height="48" alt="DDC Logo" class="logo-image">
      </div>
      <span class="logo-text">DDC<span class="logo-accent">.KZ</span></span>
    </a>

    <!-- Desktop Menu -->
    <div class="nav-menu" [class.open]="isMobileMenuOpen">
      <ul class="menu-list">
        @for (item of menuItems; track item) {
          <li class="menu-item">
            <a 
              routerLink="{{ item.path }}" 
              routerLinkActive="active"
              [routerLinkActiveOptions]="item.path === '/' ? { exact: true } : {}"
              class="menu-link"
              (click)="closeMobileMenu()"
            >
              {{ 'nav.' + item.key | translate }}
            </a>
          </li>
        }
      </ul>

      <!-- Language Switcher -->
      <div class="language-switcher">
        <button 
          class="lang-btn" 
          [class.active]="currentLang === 'ru'"
          (click)="changeLanguage('ru')"
        >
          RU
        </button>
        <span class="lang-separator">|</span>
        <button 
          class="lang-btn" 
          [class.active]="currentLang === 'kk'"
          (click)="changeLanguage('kk')"
        >
          KK
        </button>
      </div>

      <!-- Theme Switcher -->
      <div class="theme-switcher">
        <button 
          class="theme-btn" 
          [class.active]="currentTheme() === 'digital'"
          (click)="setTheme('digital')"
          title="Digital Theme"
        >
          <span class="theme-label">digital</span>
          <span class="theme-sub">dark</span>
        </button>
        <span class="theme-separator">|</span>
        <button 
          class="theme-btn" 
          [class.active]="currentTheme() === 'nbk'"
          (click)="setTheme('nbk')"
          title="NBK Theme"
        >
          <span class="theme-label">nbk</span>
          <span class="theme-sub">light</span>
        </button>
      </div>

      <!-- CTA Button -->
      <a routerLink="/contacts" class="btn-cta" (click)="closeMobileMenu()">
        {{ 'contacts.title' | translate }}
      </a>
    </div>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-menu-toggle" (click)="toggleMobileMenu()">
      <span class="hamburger-line" [class.open]="isMobileMenuOpen"></span>
      <span class="hamburger-line" [class.open]="isMobileMenuOpen"></span>
      <span class="hamburger-line" [class.open]="isMobileMenuOpen"></span>
    </button>
  </div>

  <!-- Mobile Language Switcher -->
  <div class="mobile-language-switcher" [class.open]="isMobileMenuOpen">
    <button 
      class="lang-btn" 
      [class.active]="currentLang === 'ru'"
      (click)="changeLanguage('ru')"
    >
      RU
    </button>
    <span class="lang-separator">|</span>
    <button 
      class="lang-btn" 
      [class.active]="currentLang === 'kk'"
      (click)="changeLanguage('kk')"
    >
      KK
    </button>
  </div>
</nav>
