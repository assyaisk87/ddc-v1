<div class="ai-assistant" [class.open]="isOpen">
  <!-- Header -->
  <div class="ai-header">
    <div class="ai-header-content">
      <div class="ai-header-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
          <circle cx="12" cy="12" r="3"/>
          </svg>
      </div>
      <div class="ai-header-text">
        <h3>{{ 'ai.title' | translate }}</h3>
        <p class="ai-status ai-status-wrapper">
          <span class="status-dot"></span>
          {{ 'ai.online' | translate }}
        </p>
        <p class="ai-model ">{{ modelLabel }}</p>
        </div>
    </div>
    <button class="ai-close-btn" (click)="toggleAssistant()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <!-- Messages -->
  <div class="ai-messages" #messagesContainer>
    @if (messages.length === 0) {
      <div class="ai-welcome">
        <div class="ai-avatar-pulse">
          <div class="pulse-ring"></div>
          <div class="ai-core"></div>
        </div>
        <p>{{ 'ai.welcome' | translate }}</p>
      </div>
    }

    @for (message of messages; track message.timestamp) {
      <div class="ai-message" [class.user]="message.role === 'user'" [class.assistant]="message.role === 'assistant'">
        <div class="ai-message-avatar" *ngIf="message.role === 'assistant'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
          </svg>
        </div>
        <div class="ai-message-content">
          <p>{{ message.content  }}</p>
          <span class="ai-message-time">
            {{ message.timestamp | date:'HH:mm' }}
          </span>
        </div>
      </div>
    }

    @if (isTyping) {
      <div class="ai-message assistant">
        <div class="ai-message-avatar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"/>
          </svg>
        </div>
        <div class="ai-message-content ai-typing-content">
          <div class="ai-typing">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Input -->
  <div class="ai-input-container">
    <input
      #userInput
      type="text"
      [placeholder]="'ai.placeholder' | translate"
      (input)="onInput($event)"
      (keydown.enter)="sendMessage()"
      [disabled]="!isOpen"
      autocomplete="off"
    />
    <button class="ai-send-btn" (click)="sendMessage()" [disabled]="!hasInput">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<!-- Toggle Button -->
@if (!isOpen) {
  <button class="ai-toggle" (click)="toggleAssistant()">
    <div class="ai-toggle-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <span class="ai-toggle-badge">1</span>
  </button>
}
